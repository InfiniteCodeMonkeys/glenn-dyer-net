content: "Here's another post about novels set during WWII that were published many years ago, but definitely worth checking out. Winds of War by Herman Wouk was first published in November 1971, 53 years ago. It was the first volume of a two-book set that chronicled the service of US Navy Commander Victor \"Pug\" Henry. War and Remembrance is the second novel. Each book was made into a highly successful mini-series. I just learned that a new mini-series adaptation of Winds of War was ordered in 2020 and is to be written by the producer Seth MacFarlane. Come on, Seth. We're waiting! ‍"
