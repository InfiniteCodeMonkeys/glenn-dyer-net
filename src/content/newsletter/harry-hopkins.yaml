content: "Harry Hopkins, an American statesman and presidential advisor to Franklin D. Roosevelt, was born on this day in 1890. Hopkins was a key figure in advising and administering New Deal relief programs and also oversaw the Lend-Lease program of military aid to Great Britain and the Soviet Union. Few statesmen were as close to FDR or as indispensable as Hopkins. Hopkins will make an appearance in book #5 of my Conor Thorn Series - which is as of yet unnamed! ‍"
