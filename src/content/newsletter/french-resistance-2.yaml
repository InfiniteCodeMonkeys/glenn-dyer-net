content: "The French Resistance played an important role in the Allied victory over Nazi Germany in France. The Resistance was actually the name given to several groups that published underground newspapers, conducted guerrilla warfare, collected intelligence, and aided downed Allied airmen. Several characters from my new Conor Thorn novel, Trust No One , are Resistance members who aided Conor and Emily as they trekked through Southern France seeking a highly valued target. Look for Trust No One sometime this Fall. If you haven't yet read the other novels in my Conor Thorn series, you can find links to them below! The Torch Betrayal | The Ultra Betrayal | The Unquiet Genius"
