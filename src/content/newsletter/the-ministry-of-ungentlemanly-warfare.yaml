imageAlt: The Ministry of Ungentlemanly Warfare
content: "I recently learned that Guy Ritchie will be directing a film based on the 2014 book by Damien Lewis (not the actor) titled The Ministry of Ungentlemanly Warfare: The Mavericks Who Plotted Hitler’s Downfall Giving Birth to Modern Day Black Ops. Lionsgate is planning on a 2024 release. Here’s an excerpt of the Amazon book description... “In the bleak moments after defeat on mainland Europe in winter 1939, Winston Churchill knew that Britain had to strike back hard. So Britain's wartime leader called for the lightning development of a completely new kind of warfare, recruiting a band of eccentric free-thinking warriors to become the first 'deniable' secret operatives to strike behind enemy lines, offering these volunteers nothing but the potential for glory and all-but-certain death.” The film stars Henry Cavill and, one of my favorites, Alan Ritchson (Jack Reacher). Ritchie is a great director whose forte is action films."
