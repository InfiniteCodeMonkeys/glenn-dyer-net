content: The Second Battle for El Alamein took place from October 23rd to November 11th, 1942. Allied forces, led by Lieutenant-General Bernard Montgomery, were comprised of units from countries that were a part of the British Empire. The Allied victory eliminated the Axis threat to Egypt, the Suez Canal and the oil fields of the Middle East and Persia.
