content: "I wanted to mention an author who writes some of the most popular WWII set fiction out there – Lee Jackson. His After Dunkirk series is always highly ranked on Amazon. The next book in the After Dunkirk series, Driving The Tide, is due out on December 7, 2023. Another author who is well worth your valuable time! ‍"
