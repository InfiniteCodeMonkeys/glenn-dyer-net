content: "It's always an absolute delight for any author to hear thoughts on their novels from readers, and I'm definitely no exception to that rule! I very much so appreciate your kind words and thoughts on my novel, The Ultra Betrayal . And if you haven't sunk your teeth into the next novel in the Conor Thorn series, The Unquiet Genius , it's available today! Check out the entirety of the Conor Thorn series by clicking here! The Torch Betrayal | The Ultra Betrayal | The Unquiet Genius"
