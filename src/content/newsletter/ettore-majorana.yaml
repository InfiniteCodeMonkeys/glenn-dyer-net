content: "Italian physicist Ettore Majorana, a major character in book #3 in the Conor Thorn Series, was born on this day in 1906, in Catania Italy. He was a brilliant scientist who went missing in March of 1938 and was never found. Many think he committed suicide, others believe he made his way to South or Central America and lived into the 1950s. If you're interested in reading more about Ettore Majorana, and many more exciting characters, be sure to check out my Conor Thorn Series by clicking the links below! The Torch Betrayal | The Ultra Betrayal | The Unquiet Genius"
