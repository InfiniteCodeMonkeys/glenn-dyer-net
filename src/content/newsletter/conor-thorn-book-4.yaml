content: "It was the 12th of May when I finally finished the first draft of the 4th novel in the #ConorThornSeries. It was 11 months of writing which followed several months of research. (I fell down a rabbit hole on this book’s research!) I posted about this before, but this time I wanted to mention that I’ll reveal the new title next month. Did you notice I placed the glass of Writer’s Tear's whisky over the title? Clever, heh? I amaze myself sometimes. More news on the release of book #4 coming this summer."
