content: "There’s another Tom Hanks and Steven Spielberg collaboration coming our way. Apple+ will be streaming 9 episodes of Masters of the Air sometime mid-Spring 2023. Yikes! It’s almost Summer, guys! The series is based on the book by Donald L. Miller titled Masters of the Air: America’s Bomber Boys Who Fought the Air War Against Nazi Germany. The series will focus on the 100th Bombardment Group of the Eighth Air Force. Can’t wait!"
