content: "I can’t thank Amazon customer Kevin Wolfe for his five-star review of The Torch Betrayal. “Glenn Dyer is at the top of this pack of suspense writers. The elegant mix of historical facts and fiction is pure genius. Could not put this book down. I found myself right in the middle of a World War Two espionage plot. There are three books in this thrilling series. I am reading them all and you will too!” Many thanks, Kevin! You can order the audiobook version tomorrow!"
