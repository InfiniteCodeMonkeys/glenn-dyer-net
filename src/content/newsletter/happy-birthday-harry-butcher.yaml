content: On this date in 1901, Harry C. Butcher was born in Springville, Iowa. A successful radio broadcaster, Butcher served during WWII as General Eisenhower’s naval aide. I introduced Butcher as a character in the first Conor Thorn thriller, The Torch Betrayal. Butcher reappears as a main character in the next Thorn novel, Trust No One, due out this fall. A bit of trivia, while Butcher ran the CBS radio station in Washington DC, he was the one who first coined the phrase “fireside chats” referring to FDR’s radio addresses to the nation during the Depression.
