content: "More kind words about The Ultra Betrayal this time from JFK (no, probably not that one...) “Conor and Emily really come alive in this book. When you are sad that the book is finished you know it is a truly great story. Kudos to Glenn for his devotion to historical accuracy. Please keep up the fantastic work!” Working hard on book #4 in the series, JFK! I’m grateful for your review."
