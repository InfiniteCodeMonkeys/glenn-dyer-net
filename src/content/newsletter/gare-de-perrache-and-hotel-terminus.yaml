content: The Hôtel Terminus, now called the Hôtel Mercure, is located very close to the Gare de Perrache, one of Lyon’s main train stations. Here are a couple of photos that demonstrate its proximity to the station where Jews and suspected members of the Resistance were transported to camps in the east. Several scenes in the next Conor Thorn novel will take place in this infamous hotel. ‍
