content: Tantor Media and I have settled on a narrator for the Conor Thorn Series. His name is Daniel Thomas May, whose audition really nailed it. Daniel has narrated over sixty books for Tantor Media. He’s also an accomplished actor having appeared in over thirty films and series, including The Walking Dead (2012-2013), I, Tonya and Being Mary Jane. Here’s a link to his Tantor profile and here’s a link to his IMDb profile .
