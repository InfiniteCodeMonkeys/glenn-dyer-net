content: "A tip of my hat to fellow thriller author Anthony Franze for his kind words about The Ultra Betrayal: \"History and thriller lovers alike will stay up reading late into the night … I say you can sleep when your dead. Read. And read some more! You can buy the audiobook version of The Ultra Betrayal starting tomorrow! Or should I say Listen. And listen some more!\" Cheers, Anthony!"
