content: "I am knee-deep in book #5 in the Conor Thorn Series. The research is done, the outline is complete, and the writing has commenced. I am still playing with titles. For me, the title sometimes becomes clear once I am deep into the first draft. I shared the title I am currently focused on with my wife and she hated it! I guess we’ll see where it goes..."
