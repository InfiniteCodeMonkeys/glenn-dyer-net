content: "I’d like to share news of a new release from an author that I have been following for several years – James R. Benn. He is the author of the Billy Boyle WWII Mystery Series. The 18th installment in the series, Proud Sorrows, was released on September 5th. Not only are Benn’s mysteries entertaining, but I always learn something about WWII or history in general. Benn’s books are well worth your time!"
