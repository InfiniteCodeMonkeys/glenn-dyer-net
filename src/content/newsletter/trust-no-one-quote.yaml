content: "In the shadows of World War II, where espionage and spycraft are the order of the day, trust is a luxury no one can afford. Enjoy a quote from the fourth novel in my Conor Thorn Series, Trust No One, coming soon! \"“What’s going on, Jack?” Conor asked. Waddon, grim faced, turned to Conor and Emily. “It’s not good, Conor. Stevens, they just found his body at some café—” “The Coq Hardi. In an alley in the back. He was stabbed. Bled out before they could get him to the field hospital,” Eugene said, getting out of his Jeep. “It gets worse.” Eugene looked at Waddon, who gave a quick nod. “A buddy of mine... he says they’re looking for someone—you, Conor.”\" ‍"
