content: On this date in 1945, one of the most notable battles of the European theatre of the conflict ended – the Battle of the Bulge. Also known as the Ardennes Offensive, the battle, which was the last major German offensive of the war, started on December 16, 1944. The offensive’s goal was to retake the Belgian port of Antwerp and ultimately force the Allies to accept a peace treaty allowing the Nazis to focus all their remaining forces to defeat the Soviet Union in the east.
