title: Battle of the Sea of Azov
date: "2021-10-06"
category: ""
excerpt: On this day, eighty years ago, the SS Adolf Hitler Division captured most of the Soviet Ninth Army at Berdyansk, on the Sea of Azov. Over 100,000 Soviet troops were taken prisoner.
