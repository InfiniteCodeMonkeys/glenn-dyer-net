content: Prolific author, Leon Uris, was born on this date in Baltimore, MD. A US Marine who fought in WWII in the Pacific theater, Uris was the author of several critically acclaimed novels such as Exodus, Trinity, Battle Cry, and Topaz. He died in 2003 and is buried at Quantico National Cemetery.
