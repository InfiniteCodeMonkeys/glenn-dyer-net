content: "Today marks the birth of Jean François Darlan. Darlan was the Commander-in-Chief of the French Navy at the start of WWII. A controversial character, he wavered from being cooperative with the Nazis after their invasion of France to being pro-Allied later in the war. Many accused him of being self-serving and an opportunist. He was assassinated on December 24, 1942, by a monarchist and anti-Vichyite. His assassination provided the spark for Trust No One, book #4 in my Conor Thorn Series, which will be released this fall."
