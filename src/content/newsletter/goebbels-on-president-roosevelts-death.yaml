content: "Propaganda minister, Josef Goebbels, told the following to Hitler after the news of the death of Franklin Roosevelt on April 12, 1945: “My Fuhrer, I congratulate you. Roosevelt is dead. It is written in the stars that the second half of April will be the turning point for us.” The turning point never arrived. Hitler committed suicide on April 30th. Nazi Germany signed a document of surrender on May 4, 1945."
