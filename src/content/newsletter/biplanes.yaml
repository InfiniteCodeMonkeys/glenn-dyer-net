content: At the start of WWII, there were thousands of biplanes still in service. While they were soon replaced with more modern planes, the Russian PO-2 continued to serve in the Soviet Air Force into the 1950s. The plane and the female pilots who flew them in night bombing mission in WWII are featured in James R. Benn’s Road of Bones , the 16th book in his fantastic Billy Boyle WWII mystery series.
