content: "These are images of the funicular that takes you up to the Basilique Notre Dame de Fourvière in Lyon, France. It is a short trip to the impressive basilique and well worth the time. While visiting Lyon, I was intrigued by the setting of the funicular that makes its way through Vieux Lyon and plan to work it into an action scene in Book #4 in the Conor Thorn Series. ‍"
