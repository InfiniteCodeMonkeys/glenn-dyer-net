title: Bergen-Belsen Liberation Day
date: "2023-04-14"
category: ""
excerpt: Did you know that on this day, seventy-eight years ago, the Bergen-Belsen concentration camp was liberated by British forces? More than 60,000 prisoners were found inside the walls of the camp.
