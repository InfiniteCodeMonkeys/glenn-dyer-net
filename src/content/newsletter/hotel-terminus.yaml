content: One of the most emotional sites that my wife and I visited on our recent research trip to France for the next Conor Thorn novel was our visit to the Hôtel Terminus in Lyon. This hotel served as the headquarters of the Gestapo in Lyon from 1942 to early 1943. The hotel was the site of brutal interrogations of suspected Resistance members, supervised by Klaus Barbie, known later as the Butcher of Lyon. Roaming the halls of this hotel, since renamed, sent chills down my spine. ‍
