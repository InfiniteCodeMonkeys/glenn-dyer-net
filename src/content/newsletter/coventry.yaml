content: On the night of November the 14th, eighty-one years ago, the German Luftwaffe bombed Coventry. There were 449 bombers that participated in the raid, killing 568 people and wounding 863. Many factories making war material were badly damaged. Coventry’s cathedral was reduced to piles of rubble. ‍
