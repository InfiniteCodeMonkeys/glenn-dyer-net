content: My research for the next book in the Conor Thorn Series led me to Information Hunters – When Librarians, Soldiers, and Spies Banded Together in World War II Europe by Kathy Peiss. This fascinating story is about the librarians, scholars, and archivists who were recruited to travel abroad to seek out documents and books that would aid the Allied cause, specifically gathering information for intelligence purposes. Of particular interest was Adele Kibre, who worked for the Interdepartmental Committee for the Acquisition of Foreign Publications (IDC). More on Adele in later posts.
