content: One of my favorite writers, Harlan Coben, is a name very familiar to many readers and to those who have seen his words come to life in numerous adaptations on Netflix. I wanted to point out that a recent Netflix adaptation, Shelter, was filmed in numerous New Jersey locations, including my high school, Livingston High School. Here’s a link to an article from New Jersey Monthly that offers some details about the various locations.
