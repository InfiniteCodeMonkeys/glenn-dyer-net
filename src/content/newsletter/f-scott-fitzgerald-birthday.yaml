content: On this day in 1896, Francis Scott Key Fitzgerald was born in St. Paul, Minnesota. He achieved acclaim in the 1920s, but he was regarded as one of the greatest American writers of the 20th century only after his death. While he only published four novels, he wrote 164 short stories.
