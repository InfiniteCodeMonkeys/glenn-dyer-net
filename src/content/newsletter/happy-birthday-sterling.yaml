content: "Sterling Hayden was born on this day in 1916 in Upper Montclair, NJ, which is where I was born! Hayden, best known as an accomplished actor, was a decorated Marine Corps officer, expert sailor, and a member of the OSS. He died at the age of 70 in Sausalito, CA. I hope to work Hayden into a future Conor Thorn story. I hope I can do his character justice!"
