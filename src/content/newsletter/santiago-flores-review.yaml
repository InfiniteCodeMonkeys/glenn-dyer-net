content: "Here’s a virtual fist bump for Santiago Flores for his kind words for The Unquiet Genius: “The action in this novel can be described as nail biting, making the book unputdownable. With a great plot, very well described characters and also interesting dialogues and scenes, this is a book I will certainly recommend reading.” Many thanks, Santiago!"
