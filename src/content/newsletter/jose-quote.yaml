content: "A shout out to Amazon customer Jose Popoff for his five-star review of The Unquiet Genius. Jose wrote: “The story is packed with action and thrills. I always enjoy fictional stories based on true events when the historic events are accurate. You can tell that the author did good research for this one. That is one of the things that made this story more enticing to me.”"
