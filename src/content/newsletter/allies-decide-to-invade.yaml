content: On this date in 1942, President Roosevelt cabled his trusted aide, Harry Hopkins, that plans for the landings in North Africa, code-named Operation Torch, would take place “not later than October 30”, therefore abandoning plans for a US-proposed invasion of the European continent. ‍
