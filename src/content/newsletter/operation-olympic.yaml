content: The first stage of Operation Downfall, the proposed US plan for an invasion of the Japanese home islands, was set to begin on this day in 1945. Codenamed Operation Olympic, it, along with all other aspects of Operation Downfall, was rendered unnecessary after the unconditional surrender of Japan.
