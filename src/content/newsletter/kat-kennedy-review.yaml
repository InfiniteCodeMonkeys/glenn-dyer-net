content: "I owe Kat Kennedy a cocktail or two for her five-star review of The Unquiet Genius: “This well-researched historical thriller is a fast-paced adventure that will keep you turning pages late into the night. Readers will find the novel both entertaining and educational. Characters are interesting and well-rounded. Highly recommended for lovers of history especially World War II.” Kat, I’m ready when you are! Oh, and thanks for the kind words!"
