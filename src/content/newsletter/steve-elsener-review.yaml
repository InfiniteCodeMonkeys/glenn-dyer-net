content: "I tip my Yankee hat to Steve Elsener of the Military Writer’s Society of America for his review of my latest offering, Trust No One. Thanks a million, Steve! “Trust No One by Glenn Dyer is a well-researched and written WW2 historical novel that entertains, informs, and intrigues readers…We get double-dealing, thrilling escapes, and violence. All the boxes are checked.”"
