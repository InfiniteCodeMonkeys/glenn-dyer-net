content: Enrico Fermi, who makes an appearance in The Unquiet Genius , Book 3 in the Conor Thorn Series, was born on this day in 1901. Fermi was an Italian born physicist who is credited with creating the world’s first nuclear reactor, the Chicago Pile-1.
