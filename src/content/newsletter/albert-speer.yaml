content: Albert Speer, Minister of Armaments and War Production during most of WWII, was also Hitler’s favorite architect and a member of his inner circle. Speer, among other historical figures, makes an appearance in book 3 in my Conor Thorn Series – The Unquiet Genius. Look for its release late spring.
