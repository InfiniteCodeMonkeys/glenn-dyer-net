content: "Have you been there? Back in 2014, my wife and I traveled to France and visited the D-Day landing beaches of Normandy. We had a guided tour of the beaches and the surrounding areas that was so moving and informative. This is a picture of Omaha Beach. It was so odd to see the two trotters running up the beach while we were getting the historical low-down from our tour guide. If you’ve been there, I would love it if you would share your experience in a comment. Thanks!"
