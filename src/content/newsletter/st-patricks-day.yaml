content: "Happy St. Patrick’s Day! Being 100% of Irish descent, I am a proud Irishman. It’s no wonder that I gave the same lineage to the main protagonist in the Conor Thorn Series. Conor was born in 1916 in Dublin, Ireland to Jack Thorn and Bridgett Maguire. It was a tremulous time in Dublin, the sight of the Easter Uprising, the Irish republican uprising against British rule in Ireland."
