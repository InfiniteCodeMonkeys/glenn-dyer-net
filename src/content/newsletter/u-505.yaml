content: On this date, the US destroyer Chatelain, a part of Task Group 22.3, was involved in capturing the German submarine U-505 off the coast of West Africa. One of six U-boats captured by Allied forces during the war. She was towed to Bermuda. All but one of her crew was taken prisoner. Enigma codes were part of the trove of intelligence that was seized in the action. U-505 is now on display at the Museum of Science and Industry in Chicago.
