content: On this day in 1929, Jack Higgins was born. Higgins was the pen name of Henry Patterson, who was a prolific and best-selling author of thrillers and espionage novels, including the popular The Eagle Has Landed . Higgins wrote 85 novels and sold more than 250 million copies. His books that were set during WWII were a great influence on me growing up and provided much inspiration for my own writing endeavors. He died last year at the age of 92. Rest in peace, Jack.
