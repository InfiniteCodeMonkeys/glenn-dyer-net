content: It was in 1943, on this very day, in fact, that PT-109, commanded by Lt/JG John F. Kennedy, was rammed and sunk by the Japanese destroyer Amagiri. JFK’s actions that day and days following played no small role in his rise to the presidency in the years following the sinking. ‍
