content: My father, Thomas P. Dyer, was born on this date in Orange, NJ. He was inducted into the US Army on July 1, 1940 and served in a Field Artillery Unit. He was discharged on August 1, 1941 due to a physical disability. But he re-enlisted on August 1, 1942 in the US Army Air Force and served until the end of WWII.
