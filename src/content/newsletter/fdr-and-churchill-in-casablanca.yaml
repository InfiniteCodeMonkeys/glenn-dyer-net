content: On this day, seventy-nine years ago, FDR and Churchill, along with their huge staffs, met in Casablanca over ten days to discuss the continued prosecution of the war. At the conclusion of the conference during a press conference, FDR first uttered the controversial policy of “unconditional surrender”, which some say, surprised even Churchill himself.
