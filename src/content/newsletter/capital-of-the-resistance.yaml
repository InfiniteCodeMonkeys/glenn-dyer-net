content: "On September 14, 1944, General Charles de Gaulle proclaimed the city of Lyon, France to be “the capital of the Resistance” even though the city had been the site of countless acts against the Nazis and French collaborators since the fall of France in 1940. Much of book #4 in the Conor Thorn Series takes place in and around this great city."
