content: "I hope that you all enjoy a quote from my upcoming novel, Trust No One , the fourth novel in the Conor Thorn Series. \"“And I especially don’t enjoy hanging around anyone who washed out of any military service, including the pansy-assed navy.” Conor had enough. He stood, the backs of his knees sending his wicker chair sliding across the deck. Emily stood just as quickly and intercepted Conor on his path to Simmons. “Captain, I’m Emily Bright. I don’t get damn coffee and I’m a terrible typist.” She paused so she could push Conor off with her open right hand. “No, actually, I’m a very good typist. Maybe a little rusty since I began working undercover for MI6. Oh, and Conor, that’s him who you insulted, was, to use your terminology, washed out of the navy on false charges admitted to by his former commanding officer. He was... Conor, would the term ‘railroaded’ be appropriate?” Conor made no effort to mask his smirk. “Appropriate as shit, Emily.”\""
