content: Heisenberg, a Nobel Prize winner in 1932, was a German theoretical physicist who was a key figure in the Nazi atomic weapons program during WWII. He plays a major role The Unquiet Genius, the third book in the Conor Thorn series. He died in 1976 in Munich.
