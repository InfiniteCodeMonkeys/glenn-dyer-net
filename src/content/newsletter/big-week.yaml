content: Operation Argument, colloquially known as “Big Week”, commenced eighty-one years ago, on this date. A series of daring daytime air raids intended to cripple Luftwaffe aircraft factories, Big Week was a mixed bag of results for Allied command. Allied bombing of the aircraft industry proved ineffective, though air dominance was reinforced. Moreover, the Dutch population suffered a high number of inadvertent civilian casualties. ‍
