content: "Thanks go out to Kayleigh from the UK for her kind words about The Unquiet Genius... \"A wonderfully accurate historical spy thriller, set during WWII. The writing of this novel is concise and well-researched, with impressive knowledge of historical events and artefacts. If you have enjoyed the rest of this series, you will love this. However, it's also a great standalone read.” Thanks, Kayleigh! ‍"
