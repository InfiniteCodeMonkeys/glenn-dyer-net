content: "Did you know that Hitler decorated Luftwaffe ace pilot Adolf Galland with the Diamonds to the Knight’s Cross? Later, Hermann Göring, the head of the Luftwaffe, was so appalled after discovering the \"diamonds\" presented were ordinary stones, that he had his personal court jeweler replace them with authentic diamonds. ‍"
