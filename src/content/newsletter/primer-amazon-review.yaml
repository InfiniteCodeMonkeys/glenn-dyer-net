content: "So grateful for the recent five-star review from Amazon customer Primer: “World War II has always been a subject of great interest, and Glenn Dyer once again does it a great justice in this latest book…Thrilling action backlit by the consciences of a war-torn society, The Unquiet Genius catapults the reader through the hell that war is.” Thanks again, Primer!"
