content: "\"Glenn Dyer's The Ultra Betrayal is a historically-accurate, action-packed World War II spy thriller with enough daring adventure and carefully-prepared plot twists to keep the reader avidly turning pages until the final conclusion.\" I very much so appreciate the kind words about my upcoming novel release, The Ultra Betrayal, IndieReader ! The sequel to my first book, The Torch Betrayal , if you're into historical fiction and thriller novels, both are right up your alley. ‍"
