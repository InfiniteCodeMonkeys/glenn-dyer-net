content: "Enrico Fermi, the Italian physicist and creator of the first nuclear reactor, Chicago Pile-1, was born in Rome, Italy one-hundred-and-twenty years ago. Fermi, a friend of Ettore Majorana, another Italian physicist who is at the center of my next novel, The Unquiet Genius, makes an appearance in the book alongside of Lt. General Leslie Groves, the head of the Manhattan Project. Look for The Unquiet Genius on November 8! Pre-orders begin on October 18!"
