content: "A special thank you to Amazon customer Kim Spencer for her five-star review for The Torch Betrayal: “If you like history, a good story, intrigue, action, great characters and even a little bit of some love interest you will enjoy. James Bond/Da Vinci Code feel to it--Looking forward to reading the second book and for the third release.” Many thanks, Kim!"
