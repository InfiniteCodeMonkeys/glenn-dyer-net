content: "The US Army gets a general purpose vehicle! Willys-Overland delivered the prototype \"Quad\" (named for the 4x4 system it featured), to the U.S. Army on Armistice Day, now Veteran's Day, November 11, 1940. President Eisenhower once said of the Jeep, \"one of four decisive weapons the U.S. had during WWII\". During the conflict, 647,925 Jeeps were built. I wish I owned a Willys!"
