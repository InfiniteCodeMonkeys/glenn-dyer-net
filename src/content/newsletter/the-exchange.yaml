content: "Mitch McDeere is back! The prolific John Grisham released a sequel to his bestseller The Firm today. The Exchange reintroduces Mitch and Abby McDeere, whom readers haven’t heard from since the 1991 publication of Grisham’s second bestselling thriller. The story picks up fifteen years later and finds the couple living in Manhattan where Mitch works for the world’s largest law firm. Another book for my To Be Read pile!"
