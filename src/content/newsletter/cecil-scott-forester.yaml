content: Cecil Scott Forester, known by his pen name C.S. Forrester, was born on this date in 1899. Forrester was an English novelist responsible for the Horatio Hornblower series. He also, among many other works, wrote The African Queen and The Good Shepard, which was adapted and made into the movie Greyhound, starring Tom Hanks.
