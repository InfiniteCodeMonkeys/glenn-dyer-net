content: Hélène Deschamps Adams was born on this date in 1921 in Tianjin, China. As a teenager, Hélène joined the French Resistance and later the OSS, the forerunner of the CIA. She did it all - courier, secretary that infiltrated the French Milice, a spy reporting on German airfield locations and other German military installations. She also helped save Allied airmen escaping German hands and assisted Jewish families escape to Spain. Her autobiography, Spyglass , is a wonderful and inspiring read.
