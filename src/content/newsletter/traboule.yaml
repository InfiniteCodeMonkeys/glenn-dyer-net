content: "This is a picture of a traboule found in the city of Lyon, France. A traboule is a secret covered passageway that connected streets in the old section of the city. The original users were the silk manufactures who used the traboules to transport their products. While on a research trip to Lyon, I spent some time tracking down the traboules that are still accessible to the public, and plan to feature them in my next Conor Thorn novel. Here's a video I took while inside one. ‍ ‍"
