content: On my visit to Lyon, France last December to do research for the 4th book in the Conor Thorn Series, I visited the Resistance and Deportation History Centre. This museum does a wonderful job explaining the action of the French Resistance and its battle against the forces of Nazi Germany. Here’s a link to the museum’s site. The photo of German soldiers marching on a Lyon street is from a display in the museum.
