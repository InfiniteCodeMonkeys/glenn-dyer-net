content: On this day, eighty years ago, the fateful and, ultimately, controversial Bombing of Dresden began. In a joint American/British operation, allied air forces dropped around 3,900 tons of high explosive and incendiary ordnance on the city center, ultimately resulting in a devastating and all-consuming firestorm. ‍
