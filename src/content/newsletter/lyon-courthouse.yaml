content: This is a picture of the courthouse in Lyon, France. My wife, Chris, and I took a brief tour of the building on a recent visit while doing research for the fourth book in the Conor Thorn Series. On May 11, 1987, SS officer Klaus Barbie, the “Butcher of Lyon”, who was head of the Gestapo from November 1942 to August 1944, went on trial in this courthouse on charges of crimes against humanity. Barbie is featured in the next novel in the Conor Thorn Series. ‍
