content: On July 8, 1943, Jean Moulin, died from the results of torture at the hands of Gestapo officer Klaus Barbie. Moulin was one of the key heroes of the French Resistance during WWII. Under orders from Charles de Gaulle, he unified several factions of the Resistance under the National Council of the Resistance in 1943.
