content: "Throughout the weeks leading up to Operation Landcrab, the United States' campaign to retake the island of Attu, planned for early May 1943, the United States Navy is bombarding Japanese positions. Today would not be a good day to be on the westernmost tip of the United States, seventy-eight years ago."
