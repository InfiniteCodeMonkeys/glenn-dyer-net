content: General William “Wild Bill” Donovan died on this day in 1959. Lawyer, soldier, diplomat, and founder of the Office of Strategic Services in 1942, the precursor of the CIA. Donovan, who fought in WWI, was bestowed the Medal of Honor, the Distinguished Service Cross, the Distinguished Service Medal, the National Security Medal and the Purple Heart, and the Silver Star for service to his country. He appears a number of times in all of the Conor Thorn books.
