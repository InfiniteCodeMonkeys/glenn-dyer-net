content: "I mentioned last Friday that book #4 in the Conor Thorn Series will be released this Fall. But, I didn’t mention the title. Drum roll please… Trust No One takes place in Algiers and Southern France, with most of those scenes taking place in Lyon, the hotbed of the French Resistance. The book is in the edit stage and that means, cut, cut, cut, revise, revise, revise. Not fun, but truly necessary."
