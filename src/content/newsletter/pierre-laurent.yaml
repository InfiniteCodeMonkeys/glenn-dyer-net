content: "In the next Conor Thorn novel, there is a character that plays a key role named Pierre Laurent. He needed a home in Lyon, and I settled on this home, behind a wall, as his. The location, where two roads met, offered opportunities for Conor and Emily Thorn to escape the clutches of the Gestapo. Or at least, that’s what my current thinking is!"
