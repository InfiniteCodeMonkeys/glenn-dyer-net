imageAlt: Carl Oberg
content: "In doing the research for book #5 in the Conor Thorn Series, I dug further into the background of a character that appeared in some scenes in Trust No One, SS-Obergruppenführer Carl Oberg, known as the \"Butcher of Paris\". Oberg, as the Higher SS and Police Leader for Occupied France, ordered executions and the deportation of over 40,000 Jews that were sent to extermination camps. What struck me was that Oberg survived the war. He died in 1965 after his death sentence was commuted. He was released in November of 1962 and was pardoned by French President Charles de Gaulle. Many Nazi officials and officers that were involved in crimes against humanity lived beyond the end of the war. A fact that, for me, is most disturbing."
