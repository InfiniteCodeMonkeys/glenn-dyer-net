content: While it is common knowledge that the Soviet Union fought on the side of the Allies during WWII, many people don’t remember or know that the USSR invaded Poland on this date in 1939, about two weeks after Nazi Germany invaded Poland, starting what became the Second World War. Stalin joined the Allies after Hitler invaded the Soviet Union on the 22nd of June 1941.
