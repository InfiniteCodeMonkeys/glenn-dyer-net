content: "Some news for my local friends, I am thrilled and honored to be a part of the Park City Library’s annual Wasatch Back Local Author Celebration tomorrow, October 1st at 11AM. I will be joined by 5 other local authors where we will be reading and hosting a Q&A. The other authors participating are Nancy Roe, Maya Silver, Denise Devines, and Honey Parker. Here’s a link for more info. ‍"
