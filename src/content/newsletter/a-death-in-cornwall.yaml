content: "Hey, you. Yes, you! I’m curious, what book are you currently reading? I'm deep into Daniel Silva's A Death in Cornwall, the 24th book in his bestselling Gabriel Allon series. And might I say, especially for a writer like me, just to have written 24 books is an incredible accomplishment. It sounds trite but Silva has crafted characters in this series in such a way that you can't help but feel they are real. I love this series. ‍"
