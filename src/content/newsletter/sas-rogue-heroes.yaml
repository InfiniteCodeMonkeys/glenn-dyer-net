content: "Amazon Prime has a great series that has me hooked - SAS: Rogue Heroes. It's based on Ben Macintyre's book of the same name (published in 2016). The series sports a huge cast and some of the best action scenes set during WWII that I've seen in recent productions. No easy feat given the shortage of equipment and such. You have to check it out if you are interested in historical action. I’m also curious what you’re watching. Share in the comments below! #AmWatching #AmazonPrime #SAS #RogueHeroes #BenMacintyre #WWII #WorldWarII #HistoricalFiction #Thriller #Streaming #AmStreaming"
