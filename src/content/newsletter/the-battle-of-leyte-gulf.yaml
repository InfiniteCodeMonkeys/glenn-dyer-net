content: "The Battle of Leyte Gulf, a victory for the Allies, is referred to by some as the greatest naval battle in history. It was fought over a four-day period beginning on October 23, 1944. The battle between naval forces from the US and Australia against the Japanese Imperial Navy actually consisted of four separate battles: the Battle of the Sibuyan Sea, the Battle of the Surigao Strait, the Battle of Cape Engaño, and the Battle of Samar."
