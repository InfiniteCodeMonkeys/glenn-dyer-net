content: "Amy K. completely made my day when I read her 5 star review for The Ultra Betrayal ! ‍ “I absolutely could not get enough of Mr. Dyer’s writing style overall. He writes with such a sense of ease and believability that it truly feels as if you are living alongside the protagonist and living his story as he is experiencing it.” ‍ I owe you Amy!"
