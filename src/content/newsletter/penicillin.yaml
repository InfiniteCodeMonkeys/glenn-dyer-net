imageAlt: Penicillin
content: A common mold that was found on old bread was discovered to destroy a host of bacteria by Scottish scientist Alexander Fleming in 1928, but it wasn’t until 1940 that penicillin was found to have a crucial healing impact. It came into wide used during WWII due to its ability to fight blood poisoning from infected wounds.
