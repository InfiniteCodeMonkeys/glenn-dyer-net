content: "I thought I’d pass along news of a book released this past June 8th that may be of interest to WWII history buffs. Leyte Gulf: A New History of the World’s Largest Sea Battle by Mark Stille. Here’s a brief description from Amazon... “A fascinating re-examination of the battle of Leyte Gulf, the largest naval encounter in history and probably the most decisive naval battle of the entire Pacific War, and one that saw the Imperial Japanese Navy eliminated as an effective fighting force and forced to resort to suicide tactics.”"
