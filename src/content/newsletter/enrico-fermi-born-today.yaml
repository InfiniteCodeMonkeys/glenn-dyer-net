content: Enrico Fermi, the Italian physicist, who was credited with the creation of the first nuclear reactor, was born on this date in Rome, Italy. A naturalized American citizen, Fermi was a member of the Manhattan Project and was awarded the 1938 Nobel Prize in Physics. Fermi made a brief appearance in Book 3 in my Conor Thorn Series, The Unquiet Genius. I am a big fan of including historical characters in my novels. It is a great opportunity to share some historical knowledge that may have been lost to many over the years. ‍
