content: On this day in 1943, SS Major-General Stroop reported to his superior Heinrich Himmler that “The Warsaw ghetto is no more.” During the operation to eliminate the ghetto, 14,000 Jews were killed or sent to the Treblinka death camp and another 42,000 were deported to labor camps.
