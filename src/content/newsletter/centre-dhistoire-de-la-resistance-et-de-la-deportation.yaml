content: While on a recent trip to France doing research for the next book on the Conor Thorn Series, our visit to the Centre d’Histoire de la Resistance et de la Déportation in Lyon was a highlight. A former HQ for the Gestapo who took over the French Army’s medical school, it is now a museum that comprehensively delves into the role that Lyon, called by General de Gaulle in 1944 as the “capital of the Resistance” played in the fight against their Nazi occupiers. Here’s a link to the museum .
