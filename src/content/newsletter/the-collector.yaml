content: "Daniel Silva’s new Gabriel Allon book, The Collector , was released yesterday. If you haven’t read any of Silva’s Allon books, you are truly missing out on one of the most thrilling and well-researched thriller series. Here’s a brief description... “Legendary art restorer and spy Gabriel Allon joins forces with a brilliant and beautiful master-thief to track down the world’s most valuable missing painting but soon finds himself in a desperate race to prevent an unthinkable conflict between Russia and the West.” The Collector has already been added to my to-be-read table!"
