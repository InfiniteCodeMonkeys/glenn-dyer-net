content: On this day, eighty years ago, the Russian defenders of Stalingrad would have been busy mopping up the last remnants of the German Sixth Army. Of the approximately 170,000 German prisoners of war that resulted from the deadliest engagement in human history, only 6,000 would live to see repatriation.
