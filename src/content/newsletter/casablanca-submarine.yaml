content: "The French submarine, Casabianca, had an impressive WWII history. She escaped from Toulon, France in November 1942 when the Nazis occupied Vichy, France. While most of the French fleet was scuttled, the Casabianca escaped to Algeria and played a significant role in helping infiltrate agents into Corsica and southern France. The sub, commanded by Jean L’Herminier, survived the war. She is featured in book #4 in the Conor Thorn Series."
