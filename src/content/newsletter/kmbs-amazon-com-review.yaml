content: "KMB’s 5 Star Amazon review of The Torch Betrayal put a smile on my face that made my face hurt “This book, which is inspired by true events of 1942…the author writes in fluid prose and sticks to correct historical detail, giving readers that feeling of being right in the midst of the activity. Readers who love John LeCarré and Daniel Silva now have a new author’s books to devour.” Thanks, KMB! Much appreciated."
