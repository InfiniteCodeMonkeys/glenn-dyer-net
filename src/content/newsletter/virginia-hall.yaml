content: Virginia Hall, an agent with Britain’s Special Operations Executive (SOE) and the American Office of Strategic Services (OSS) during World War II, was born one-hundred-and-sixteen years ago today. She was the first female agent that operated in Vichy, France. The Gestapo considered her “the most dangerous of all Allied spies”, according to author Roger Meyer. The book A Woman of No Importance by Sonia Purnell, which is based on Hall’s life, will soon be a motion picture with a release date sometime in 2023.
