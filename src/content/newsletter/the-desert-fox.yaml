imageAlt: The Desert Fox
content: "Eighty-one years ago, then Generalleutnant Erwin Rommel, freshly arrived in Libya to take command of the Afrika Corps, would have been busy flummoxing both the overly passive Italian commander-in-chief and his British enemies. His sly and effective command of forces during the Western Desert Campaign earned him the nickname \"Desert Fox\" from British media. In 1944, he was implicated in the July 20th plot to kill Hitler. He committed suicide rather than face a trial for his involvement."
