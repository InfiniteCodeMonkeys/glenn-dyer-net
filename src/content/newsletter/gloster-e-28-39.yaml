content: Did you know that the British Gloster E.28/39 was the first British jet engine aircraft and first flew in 1941. It was actually the fourth jet engine aircraft that flew. Germany developed two jet aircraft and Italy one before the Gloster took flight. Its development aided the development of the Gloster Meteor which did see action in 1944.
