content: The incomparable Ian Fleming was born on this date in Mayfair, London, in 1908. The author of the James Bond series, was assigned to Britain’s Naval Intelligence Division during WWII. He was involved in the planning and oversight of two intelligence units, 30 Assault Unit and T-Force. Fleming makes an appearance in the three Conor Thorn novels, being a long time friend of Emily Bright.
