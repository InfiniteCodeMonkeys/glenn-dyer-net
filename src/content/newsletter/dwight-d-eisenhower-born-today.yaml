content: Dwight D. Eisenhower, the 34th President of the United States, was born on this date in 1890 in Denison, Texas. While Ike served as president for two terms (1953-1961), he is best known as the Allied Expeditionary Force Supreme Commander in the European Theatre of World War II. He oversaw the invasions of North Africa, Sicily, Italy, and France, as well as the final Allied push into Germany.
