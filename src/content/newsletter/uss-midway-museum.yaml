content: "On a recent visit to San Diego, I took time to visit the @USS Midway Museum. It's sad to report, but I did not plan properly - my wife and I spent three fascinating hours onboard but could have gone for double that. Here’s a fantastic video that will give you an idea of what’s in store for you when to get there. Well worth your time if you find yourself in San Diego with six hours to kill. By the way, the docents onboard were the best part of the visit!"
