content: "Big News! I’ve finally settled on Wednesday, November 1st as the release date for Trust No One, the next installment in the Conor Thorn WWII Thriller Series. Pre-orders will be open on October 2nd. Trust No One took me almost two years to research, outline and write. I hope it doesn’t disappoint!"
