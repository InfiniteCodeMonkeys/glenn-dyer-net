content: "On this day in 1904, Carleton Coon was born in Wakefield, Ma. Coon was a professor of anthropology at theUniversity of Pennsylvania and Harvard. Coon served in the OSS during WWII and wrote about his time in the OSS in A North Africa Story: The Anthropologist as OSS Agent. Coon was an extremely colorful character who shows up in my next book in the Conor Thorn Series, which will be released this Fall."
