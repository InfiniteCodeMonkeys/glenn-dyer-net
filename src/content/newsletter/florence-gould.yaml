content: "In doing research for the next installment in my Conor Thorn Series, I came across an excellent book on the American, Florence Gould. A Dangerous Woman: The Life of Florence Gould by Susan Ronald was both fascinating and frustrating in that Gould, because she was rich and powerful (she was married to Frank Jay Gould, son of the railway tycoon Jay Gould), was not prosecuted for her collaboration with the Nazis during their occupation of France during WWII. Gould will make an appearance in several scenes in the next Conor Thorn book due out in early 2025. ‍"
