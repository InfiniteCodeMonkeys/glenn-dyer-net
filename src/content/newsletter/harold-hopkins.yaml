content: Harold “Harry” Hopkins, an American statesman and one of the most trusted deputies to President Roosevelt for years, was born on this date in 1890. A close confidant of FDR’s, Hopkins lived in the White House from 1940 to 1943, taking a leading foreign policy role in dealings with the United Kingdom and the Soviet Union.
