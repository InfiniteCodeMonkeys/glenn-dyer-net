content: "The Torch Betrayal received an honest 5-star Amazon review from RFM for which I am very grateful: “This was a good historical novel. Use many factual elements and weaved the characters into the story. Some of it was a little far-fetched, but what good novel isn't? Just started the 2nd in the series and so far, it remains as good as the first.” I agree, RFM about good novels being a little far-fetched!"
