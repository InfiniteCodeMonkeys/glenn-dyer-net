content: "Here’s a shout-out to my friend Jack Carr, bestselling thriller author of the Terminal List series featuring James Reece. But it’s not for his books this time but for his wildly popular podcast Danger Close. The quality of his guests is amazing and Jack handles the interviewing chores like a pro. Here’s a blurb from his podcast page: “Jack takes readers beyond the books through conversations with warriors, tactical experts, historians, politicians, hunters, entrepreneurs, newsmakers, and fellow writers for a peek behind the curtain.”"
