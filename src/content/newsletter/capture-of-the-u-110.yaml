content: On this date in 1941, the Royal Navy captured U-110. The captured of the U-boat that was heavily damaged after it attacked an Allied convoy off the coast of Greenland, yielded a number of secret cipher documents, which were used by Bletchley Park codebreakers to solve Reservehandverfahren, a reserve German hand cipher. U-110’s capture was kept secret for seven months.
