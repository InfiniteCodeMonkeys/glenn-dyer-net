content: On my trip to France this past December to research places for the next Conor Thorn novel, I was so impressed with the Palace of the Popes in Avignon that I wanted to include some of the sights that surround the palace as locations for scenes. Like many cities in France, the old neighborhoods feature narrow streets that at night throw off a feeling of danger and intrigue. The palace was built in the 14th century and was home to 9 popes before the return of the papacy to Rome. It is one of the ten most visited monuments in France. ‍
