content: It was in the year 1896 that the acclaimed writer, F. Scott Fitzgerald, was born on September 24th. His most celebrated novel, The Great Gatsby (1925), was hailed by some contemporaries as THE great American novel. Fitzgerald wrote four story collections and 164 short stories. Fitzgerald died on December 21, 1940, in Los Angeles, but, interestingly enough, was buried in Rockville, Maryland.
