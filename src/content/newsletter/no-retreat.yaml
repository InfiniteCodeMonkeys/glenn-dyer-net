content: "On this day, eighty-one years ago, Adolf Hitler made himself the German Army commander-in-chief. His first decree was a \"no retreat\" order for his soldiers on the Eastern Front. This had the consequence of dooming thousands of troops in the outskirts of Moscow, deprived the option of tactical withdrawals."
