content: "On a recent trip to France to conduct research for the next Conor Thorn book, I came upon the Pont St. Bénézet in Avignon. Also known as Pont Avignon, the wooden bridge was first built between 1177 and 1185 and destroyed forty years later. In the year 1234, its rebuilding began as a stone bridge. Of the initial 22 arches, only four remain due to the pounding the arches received from the flooded Rhône River. The bridge’s history inspired me to include it in the next Conor Thorn novel due out later this year. More on this bridge tomorrow!"
