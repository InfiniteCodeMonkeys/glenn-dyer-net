content: Many thanks to Phillip Zozzaro from The Book Commentary for his 5 star review for the soon to be released, Trust No One. “Trust No One opens with an adrenalin-packed flourish and continues in a similarly tense fashion throughout… This book functions well on multiple levels and will attract readers who yearn for an enthralling yarn. It is hugely immersive.” It took 2 years to research and write this one. I hope Conor Thorn fans will like it.
