content: December 7, 1941 marks the date for the Japan’s sneak attack on military targets in and around Pearl Harbor. The devastating attack triggered a declaration of war against Japan and led to Germany declaring war on the US. The USS Arizona Memorial at Pearl Harbor is one of the most moving memorials that I have ever visited. It is a appropriated memorial to those 1,102 sailors and Marines who perished during the attack.
