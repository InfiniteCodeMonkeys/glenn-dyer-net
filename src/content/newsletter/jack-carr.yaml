content: "I wanted to give a shout-out to NY Times bestselling author Jack Carr. Jack is a fellow Parkite and writer of the flamin’ hot James Reece thriller series. Jack has been very generous with his feedback regarding my Conor Thorn series and I wanted to congratulate Jack on his success with the release of book #6 in the series, Only the Dead. If you haven’t yet sampled his work, you are missing some of the best thriller fiction that has come out in the last five or so years."
