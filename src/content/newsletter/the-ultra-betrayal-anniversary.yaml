content: "Seems like yesterday but as of today, it’s been 2 years since the launch of book #2 in the Conor Thorn Series, The Ultra Betrayal . The best part of the process of writing the novel was the research trip my wife Chris and I took to Sweden. Beautiful country and very friendly people."
