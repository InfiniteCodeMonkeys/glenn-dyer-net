content: This post is about another excellent WWII set novel published years ago that I very much enjoyed when I first read it in 1986. What makes The Landing different from many other WWII set novels, is that it takes place in Washington, DC. It was written by Haynes Johnson and Howard Simons, who both worked at the Washington Post at one time. The novel moves fast, and I was impressed by the depth of research both men did. Surprisingly, it can still be found on Amazon.
