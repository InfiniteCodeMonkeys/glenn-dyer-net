content: Born on this date in Sidon, Lebanon, William A. Eddy was the son of Presbyterian missionaries. Eddy was a US Marine who fought in WWI, ultimately receiving the Navy Cross, the Distinguished Service Cross, two Silver Stars, and two Purple Hearts. At the start of WWII, he rejoined the Marines and later served with US Naval Intelligence and the OSS. He appeared in books one and three in the Conor Thorn Series. Eddy was indeed an American hero.
