content: Seventy-eight years ago, nearly 1,300 heavy bombers of a combined RAF and USAAF force would have been returning from their first bombing mission over Dresden, Germany. Relatively untouched until this stage in the war, the Allies would eventually drop a total of 7,100 tons of explosives on the city.
