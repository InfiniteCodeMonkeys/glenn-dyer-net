content: If you’re a fan of the director Christopher Nolan’s films, mark July 21st on your calendar for the release of his newest film, Oppenheimer. The biographical thriller is based on the book American Prometheus, written by Kai Bird and released in 2005. It revolves around Robert Oppenheimer, the theoretical physicist who spearheaded the development of the atomic bomb for the US. The all-star cast includes Robert Downey Jr., Matt Damon and Florence Pugh, among many others.
