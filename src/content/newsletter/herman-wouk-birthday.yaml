content: The author and veteran, Herman Wouk, was born today in 1915 in the Bronx, New York. His novels that were set during WWII, like The Winds of War and War and Remembrance were big influences on my long-held desire to write historical fiction. During WWII, he served in the US Naval Reserve in the Pacific Theater on two destroyers. RIP Mr. Wouk.
