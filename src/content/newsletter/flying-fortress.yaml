title: Flying Fortress
date: "2022-01-27"
category: ""
excerpt: Did you know that the Boeing B-17 heavy bomber, nicknamed the Flying Fortress, only carried 4 tons of bombs? But it also carried 11 tons of fuel, and 1.3 tons of .50-caliber ammunition.
