content: "If you are a book blogger/reviewer, Xpresso Book Tours is organizing a release blitz for Trust No One, an Adult Historical Thriller; Espionage Thriller novel. The blitz will run from December 11th to December 15th, 2023, you can post on any day during this window. There will be excerpts available for your post, and every participant will be able to post the blitz-wide giveaway if you wish – giveaway prize(s) courtesy of me! Social media sites are welcome. ARCs are also available for blitz participants. An email with the complete post info including promo items and giveaway details will be sent to all participants on December 7th."
