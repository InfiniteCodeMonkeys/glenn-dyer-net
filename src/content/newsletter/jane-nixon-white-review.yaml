content: "I recently had the privilege of having my second novel, The Ultra Betrayal, reviewed by fellow author, Jane Nixon White. To see what she had to say, read on! ‍ The Ultra Betrayal by Glenn Dyer is the quintessential WWII spy thriller that is a must read for fans of this genre. Dyer' s hero Connor Thorne is as believable as those of W.E.B. Griffin or Steve Berry. And team Connor up with a strong yet lovely MI6 female partner working with him and Billy Donovan's OSS during the importance of protecting the allies' abilities to secretly decode the Nazis' messages, you have a formula to keep you reading all night. I did, and want more. Looking forward to book number three in this exciting new series! ‍ Thank you very much for your kind words, Jane!"
