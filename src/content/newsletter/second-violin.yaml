content: I occasionally post about a novel set during WWII that was published a few years ago in the hopes that it will be re-discovered by those fans of WWII fiction. Second Violin – An Inspector Troy Thriller by John Lawton was published in 2007. It’s the sixth book in the series. John Lawton has received high praise as a master of historical espionage. Second Violin made a big impression on me when I first read it. I had one of those “I wish I could write like that” reactions.
