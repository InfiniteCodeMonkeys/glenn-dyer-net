content: "What am I currently reading, you ask? I just started The Second Most Powerful Man In The World by Phillips Payson O’Brien. The author claims that no American, besides Franklin Delano Roosevelt, did more to shape the prosecution of World War II than Admiral William D. Leahy. O’Brien outdid himself in his research of Leahy; the text spans 448 pages! So far, the experience has been extremely rewarding."
