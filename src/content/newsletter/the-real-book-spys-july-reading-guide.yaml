content: If you are a thriller fan and haven’t checked out @therealbookspy website, you’re missing out on a ton of news from the world of thrillers. Ryan Steck, a very talented thriller author in his own right (check out his propulsive Mathew Redd series), runs the Real Book Spy site and has his thumb on the pulse of the thriller world. Here is a link to his July reading guide. ‍ ‍
