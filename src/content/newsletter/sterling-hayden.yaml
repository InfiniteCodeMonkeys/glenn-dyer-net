content: "Sterling Hayden, actor, author, sailor and OSS agent was born on March 26, 1916 in Upper Montclair, NJ. His acting credits include roles in the notable films Asphalt Jungle, Dr. Strangelove, The Godfather. Using the name John Hamilton, he served as an OSS agent in Yugoslavia and the Balkans. He received the Silver Star for gallantry in action. He might show up in a future Conor Thorn novel! Quite a guy!"
