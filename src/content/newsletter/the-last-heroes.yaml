content: Here’s another post about one of my favorite books set during WWII that was first published several years ago. The Last Heroes (Vol. 1 of the Men At War Series) by W.E.B. Griffin, is very near the top of my favorites list. And, like my Conor Thorn series, it involves the fledgling spy organization – the OSS. It introduces one of my favorite characters – hotshot pilot Richard Canidy. The series is well worth your time.
