content: On this date in 1943, anti-Nazi protests broke out in Munich, Germany when university students chanted anti-Nazi slogans and painted “down with Hitler” on walls. Twenty-five year-old Hans Scholl and his sister Sophie, her picture included here, led the protests. Both were arrested. Their group was called the “White Rose”. Here’s a link to learn more about this group .
