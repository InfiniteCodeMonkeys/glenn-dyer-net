content: Ernie Pyle, the famous war correspondent who is credited with coining the name “GI Joe”, was killed by a Japanese sniper on the island of Okinawa on April 18, 1945. He reported for most of the war from North Africa, Sicily, Italy, and France. Pyle, 44, was beloved by the GI’s that he wrote about.
