content: The film Oppenheimer has received a great deal of positive press in the last couple of weeks. Coincidently, a documentary titled A Compassionate Spy was released on August 4th. It tells the story of Manhattan Project scientist Ted Hall, who shared classified nuclear secrets with Russia. If you enjoyed Oppenheimer, this might be worth checking out. Here’s a link to the trailer on IMDB.
