content: Moe Berg, a Princeton graduate, a major league catcher, and an OSS agent during World War II, was born on this date in New York City in 1092. The brilliant agent was sent to Italy in December 1944 during Operation AZUSA to assess the Nazi’s progress on their atomic weapons project. Berg later went on to work for the CIA briefly.
