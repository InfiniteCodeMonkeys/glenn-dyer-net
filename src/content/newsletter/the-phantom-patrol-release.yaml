content: "One of my favorite writers in the genre, James Benn, has just released Book 19 in his absolutely thrilling Billy Boyle WWII Mystery series, The Phantom Patrol. The Billy Boyle series is so entertaining and informative. I always learn something new about WWII that was previously unknown to me. Well worth your time. Click here for a link to the book's trailer ."
