content: The manuscript for the next novel in the Conor Thorn Series, Trust No One , has been sent to my editor for the last copy edit and proofread. As I enter the final stretch, I am looking for 5-10 beta readers who would be interested in reading a .pdf version of the novel in order to give feedback and, possibly, some early reviews posted to Amazon. I’ll send you a signed copy of the novel if you sign-up. Reach out to me at glenndyerauthro@gmail.com if you’re interested.
