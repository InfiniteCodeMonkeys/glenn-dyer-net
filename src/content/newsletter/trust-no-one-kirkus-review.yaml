content: "Here's another review of my upcoming novel, Trust No One , this time courtesy of Kirkus Reviews. “Dyer details a cold, brutal, and violent world…the period is well-researched, and the action sequences convey tension and excitement…A series entry that offers thrills, intriguing locations, and brash heroics.” I'm humbled and thankful by your words. Enjoy Trust No One for yourself when it releases on December 11th!"
