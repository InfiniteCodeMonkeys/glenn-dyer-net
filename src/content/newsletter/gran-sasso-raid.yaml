content: "Seventy-eight years ago, 12 gliders carrying 108 paratroops and 26 SS men, snatched Italian fascist Benito Mussolini from the Camp Imperiale hotel, and shuttled him off to meet with his friend Adolf Hitler in East Prussia. Mussolini didn't last long - he and his mistress were executed on April 28, 1945 by Communist partisans. ‍"
