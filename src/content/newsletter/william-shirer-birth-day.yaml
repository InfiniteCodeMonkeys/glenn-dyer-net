content: William Shirer, a particularly noteworthy journalist and historian, was born on this day in 1904. Best known for his The Rise and Fall of the Third Reich, a history of Nazi Germany, Shirer was also an author of fiction. He was one of Edward R. Murrow’s so-called “Boys”. The New York Times called his seminal book “one of the most important works of history of our time.” ‍
