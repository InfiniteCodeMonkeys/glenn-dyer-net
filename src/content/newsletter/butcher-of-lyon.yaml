content: On this date in 1913, Klaus Barbie, the “Butcher of Lyon” was born. An officer in the German SS and SD, he was responsible for the deaths of thousands of Jews and members of the French Resistance through torture and deportation to concentration camps. He was later employed by US intelligence for his anti-communist efforts. Barbie is a major character in my next book in the Conor Thorn Series due out early next year.
