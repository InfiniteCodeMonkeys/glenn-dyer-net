content: It was on this day, seventy-eight years ago, on August 12, 1944, that the Allies started pumping petrol under the English Channel to Cherbourg, France. The operation was called, PLUTO for Pipeline Under The Ocean. The pipeline could pump 700 tonnes of petrol per day.
