content: Lieutenant General Leslie Groves was a U.S. Army Corps of Engineers officer that oversaw the construction of the Pentagon and headed the Manhattan Project which developed the atomic bomb. He makes two appearances, one with Enrico Fermi, in the third installment in the Conor Thorn Series, The Unquiet Genius, which will be released next month.
