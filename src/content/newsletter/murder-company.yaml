content: "Here’s a friendly heads-up for WWII movie buffs! Murder Company, starring Kelsey Grammer, will be released today, so check your local theatre listings. Here’s the logline... \"In the midst of the D-Day invasion, a group of US soldiers are given orders to smuggle a member of the French resistance behind enemy lines to assassinate a high-value Nazi target.\" Check out the trailer here . It certainly looks like it could be worth your time! #WorldWarII #MovieRelease #MurderCompany #AmWarching #WWII #NewRelease #AtTheaters ‍"
