content: "It was on July 13, 1942 that President Roosevelt approved the formation of the Office of Strategic Services, the first central intelligence agency in the United States. It was headed by William Donovan. The fictional Conor Thorn is a proud member of the OSS but runs afoul of Donovan in book #4 in the series which will be released later this year. I’m still working on the title!"
