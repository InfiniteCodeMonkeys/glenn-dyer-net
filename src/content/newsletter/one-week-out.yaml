content: "The release for The Unquiet Genius is just one week away. I hope you’ll take advantage of the discounted price of $2.99 during the pre-order period. The ebook price goes up to $4.99 on the live release date. Here’s a short quote from the book’s review from IndieReader: “Glenn Dyer's THE UNQUIET GENIUS has it all--action, suspense, and the endlessly fascinating World War II era and makes a worthy addition to the author’s gripping espionage series.” CLICK HERE TO PREORDER NOW! ‍"
