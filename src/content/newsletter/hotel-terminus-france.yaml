content: This is a picture of the Hotel Terminus in Lyon, France. It served as the headquarters for the Gestapo in Lyon from November 1942 to early 1943. It was the sight of interrogations and beatings of suspected Resistance members during that time. I can’t describe the chilling impact that overcame me while visiting this infamous location. Several scenes in the next Conor Thorn novel will take place in this hotel.
