content: "Coming soon! November 8th is the date for the release of the third book in the Conor Thorn Series, The Unquiet Genius. Conor Thorn, Emily Bright along with Father Sean Sullivan, and Bobby Heugle are back and, at great odds, find a way to complete another mission fraught with unexpected twists and turns. Preorders will be available via Amazon.com on Monday, October 18th!"
