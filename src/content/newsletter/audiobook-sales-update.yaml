content: The sales for the audiobook versions of The Torch Betrayal and The Ultra Betrayal have been very brisk. So, thank you for your support. I hope you enjoy Daniel Thomas May’s narration. He’s a real pro. The Unquiet Genius was recently released on May 31st, also narrated by Daniel.
