content: I thought I’d feature, every once in a while, one of my favorite novels set during WWII. My focus will be on older titles, such as bestselling author Ken Follett’s Night Over Water . Published in 1991, Follett tells a story about the last Pan Am Flying Clipper commercial flight out of England in September 1939, just days after Britain declared war against Germany, post their invasion of Poland. This would make a great beach read. Very entertaining.
