content: "Enjoy a quote from BookLife about my upcoming novel, Trust No One , releasing December 11th. \"...this action-packed thriller offers up suspense and surprising twists and turns...Dyer steeps readers in this impossibly tense moment in French and Algerian history with an eye for culture, language, and vivid descriptions...Dyer immerses readers in daring infiltrations, military secrets, dirty politics, and the unexpected. Crisply told, alive with intrigue and telling detail, Trust No One will please espionage fans who favor historical accuracy but also a ripping yarn.\" Thank you very much for the kind words, BookLife!"
