content: Did you know that while wartime convoys to northern ports of the Soviet Union were mostly successful, the US and Britain lost 58 ships, 7,000 aircraft, 5,000 tanks, and over 200,000 tons of other war material? The 58 ships lost amounted to 7.2% of all ships sent to the Soviet Union.
