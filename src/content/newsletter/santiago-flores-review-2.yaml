content: "I’m grateful for the kind words from Santiago Flores regarding The Unquiet Genius... “The action in this novel can be described as nail biting, making the book unputdownable. The story is not short and requires some time and concentration to read it and get all the details; I read it in ten days (mostly because I didn’t want to get to the end).” Many thanks Santiago! Reviews like yours are the lifeblood of any independent author!"
