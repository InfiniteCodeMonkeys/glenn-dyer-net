content: Did you know that Conor Thorn, the protagonist in The Torch Betrayal and The Ultra Betrayal, has a sister, Maggie? She appears in both novels in the Conor Thorn Series. What hasn’t been mentioned in those novels is that her birth name is Maguire, her mother’s maiden name. Maggie also makes a brief appearance in the next Thorn installment, The Unquiet Genius. ‍
