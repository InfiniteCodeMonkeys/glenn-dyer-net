content: Alan Turing was a brilliant mathematician, cryptanalyst, and computer scientist who worked for the Government Code and Cypher School at Bletchley Park. Born on this day, one-hundred-and-nine years ago, his contributions in breaking German naval ciphers were critical to Allied victory in the Battle of the Atlantic. He died on June 7, 1954.
