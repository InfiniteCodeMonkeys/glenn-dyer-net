content: "Today is a big day for bestselling author CJ Box. Battle Mountain, the 25th novel in his Joe Pickett series, comes out today. That’s an impressive number of books, CJ, and they’re all great! My wife and I love listening to them on our frequent drives across Wyoming on our way to Colorado to see our kids. For those of you who don’t know, the Joe Pickett series takes place primarily in Wyoming. It doesn't look like CJ Box is running out of ideas any time soon!"
