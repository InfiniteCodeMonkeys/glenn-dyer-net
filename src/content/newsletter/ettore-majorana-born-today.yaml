content: "Ettore Majorana, an Italian theoretical physicist, and a central character in The Unquiet Genius, was born on this date in 1906. Ettore disappeared under very mysterious circumstances in 1938. Given his expertise in the field of nuclear physics, he was sought after by both the Allies and the Nazis. A great deal of The Unquiet Genius is about this cat-and-mouse game. You can get a free download of this book and The Torch Betrayal by clicking this link . All you have to do is sign up for my newsletter. There are plenty of other historical fiction novels to also download. Have at it! ‍"
