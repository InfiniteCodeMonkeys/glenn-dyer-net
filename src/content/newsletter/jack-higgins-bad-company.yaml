content: "If you’re a fan of World War II-era fiction, don’t overlook books published in the past. One of my favorites is Jack Higgins’ Bad Company, first published in 2003. This is the eleventh book in Higgins’ Sean Dillon series and centers around the hunt for Hitler’s lost diary. The whole Sean Dillon series is great, but this entry in the series is as fast-paced and thrilling as they get! ‍"
