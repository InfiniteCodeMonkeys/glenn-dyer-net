content: Twenty-six years ago on this day in 1998, the film, Saving Private Ryan, was released. It won too many awards to list here. Suffice it to say that the Library of Congress selected the film “to be preserved in the National Film Registry as “culturally, historically, or aesthetically significant”. Not many films can claim that. The film’s ending still brings me to tears. Let me know what you think of the film in the comments. ‍
