content: "This is a picture of my “To Be Read” shelf. Good God, it’s really a table! Behind the stacked books is a row of more books! My sad excuse is that my reading fell off as I was wrapping up the first draft of the next Conor Thorn novel. Of course, watching every sport invented (including pickleball) on TV didn’t help either! I am currently reading Mark Sullivan’s Beneath A Scarlet Sky and The Enigma Game by Elizabeth Wein."
