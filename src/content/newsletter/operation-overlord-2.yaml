content: "It was 79 years ago today that the Allies stormed the five beachheads of Normandy. D-Day of Operation Overlord was the largest seaborne invasion in history, with 156,00 soldiers and 95,700 naval personnel involved in the operation. How did the two beachheads assigned to the US get their names? It seems that at the moment when the operations were being named, a general asked two NCOs where they were from. Their answers? Utah and Omaha! ‍ Here’s a link to the US Army D-Day site."
