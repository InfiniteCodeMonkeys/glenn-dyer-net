content: "To S.J. Main, a big thumbs up for your Amazon review for The Unquiet Genius: “If you are into World War II-inspired stories you are going to like this one. I enjoyed how the book was consistent in keeping me intrigued. Scene after scene was either filled with action and thrill or had twists and turns. I recommend this book to thriller readers.” Glad you liked it S.J.!"
