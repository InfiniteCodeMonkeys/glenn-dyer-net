content: Much work goes into a book launch. Thankfully, because of you, the launch of The Unquiet Genius has been very successful. I am very grateful. Here’s a short Goodreads review from Benjamin Thomas. “As with the first two novels in the series, I found reading this book to be a great pleasure. I was absorbed in the narrative, and on the edge of my seat to see what happened next. Kudos to author Glenn Dyer. I can’t wait for the next installment in this series, or anything else he may choose to write.”
