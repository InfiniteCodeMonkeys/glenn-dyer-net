content: "Did you know that the Iron Cross, the highest German award for heroism, was created in 1813 by the King of Prussia during the War of Liberation? In fact, it was inspired by an award presented by a country Germany would find itself at odds with in the next century: France’s Legion d’honneur. ‍"
