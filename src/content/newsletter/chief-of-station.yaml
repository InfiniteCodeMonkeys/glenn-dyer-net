content: Who doesn’t like a movie with heaping amounts of espionage and treachery? Chief of Station staring Aaron Eckhart opens today. If the trailer is any indication, this movie about a former CIA station chief who struggles after his wife, a former operative, dies is highly entertaining. Check out the trailer here .
