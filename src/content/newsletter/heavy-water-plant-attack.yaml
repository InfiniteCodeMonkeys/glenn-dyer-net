content: Nine British-trained Norwegian commandos conducted a sabotage operation against the heavy water production facility located in Norway eighty years ago, on this day. This was the second such attack as the first attack was aborted. The second attack led to the blowing up of 286 heavy water cells. Heavy water was a critical component used by the Nazis in their attempts to build an atomic bomb.
