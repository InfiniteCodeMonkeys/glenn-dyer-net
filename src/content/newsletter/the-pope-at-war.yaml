content: "The role of the Vatican and Pope Pius XII during WWII is a controversial subject. There are many books that have been written over the years on the subject. Some I used for research when writing The Torch Betrayal, book #1 in the Thorn Series. Recently, I came across the book by David I. Kertzer titled The Pope At War. It was released on June 7, 2022 and I saw that it had received numerous positive reviews, including one from Daniel Silva, the writer behind the Gabriel Allon series, which caught my eye: “The most important book ever written about the Catholic Church and its conduct during World War II.” If WWII history is a passion for you, you might want to check this book out."
