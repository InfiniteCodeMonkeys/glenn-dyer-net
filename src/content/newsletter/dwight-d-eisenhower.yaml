content: Dwight David Eisenhower was born on this date in 1890. Eisenhower, the 34th president of the United States, served two terms, from 1953 to 1961. During WWII, he rose to the rank of a five-star general and was Supreme Commander of the Allied Expeditionary Force in Europe. He died March 28, 1969.
