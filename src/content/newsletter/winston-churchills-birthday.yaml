content: Sir Winston Churchill, Prime Minister of the United Kingdom during WWII and also from 1951 to 1955, was born on this date in 1874. Churchill is one of the most famous historical figures of the 20th century. Churchill, of mixed English and American parentage, was a prolific writer, artist, and statesman. He died on January 24, 1965.
