content: "Today marks the birthday of Dame Agatha Mary Clarissa Christie. Born in 1890, she wrote 66 mystery novels and 14 short story collections. Her series based on the characters Hercule Poirot and Miss Marple are some of the most popular mystery novels ever written. Happy Birthday!"
