content: "Another shout-out to one of my favorite thriller writers out there, Don Bentley, another NY Times bestselling author. Don has been writing for the Tom Clancy series for some time, but, I have to say, his own Matt Drake series is truly action-packed and well worth your time and money. He released Forgotten War on April 25th to a rousing reception. Way to go, Don!"
