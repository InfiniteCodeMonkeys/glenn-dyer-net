imageAlt: 80 Year Operation Overlord Anniversary
content: 80 years ago, today, the Allies launched Operation Overlord. D-Day, 1944, saw American, British, and Canadian forces storm the beaches of Normandy after aerial and naval bombardments that had begun shortly after the stroke of midnight. While the Allies didn’t achieve their major objectives, operational footholds were established and expanded over the following months. The Allies suffered approximately 10,000 casualties. German casualties were estimated to be between 4,000 to 9,000 men.
