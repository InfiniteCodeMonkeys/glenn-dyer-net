content: Just 18 days after the D-Day landings on June 6th, US Army Major-General J. Lawton Collins’ VII Corps launched an attack on the German outer defenses of the French port city of Cherbourg. Collins and the VII Corps liberated Cherbourg on June 26th. Collins was one of a small number of high-ranking US Army officers that led troops in both theatres of WWII.
