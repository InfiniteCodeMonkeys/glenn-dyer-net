content: The WWII set movie White Bird, opens today. The film, starring Helen Mirren, is based on the novel White Bird by R.J. Palacio. It tells the story of a young girl’s (Mirren’s character) childhood in Nazi-occupied France, where she was sheltered by a courageous mother and her son. Here’s a link to the trailer on YouTube .
