content: The Battle of Midway, a major turning point in the war in the Pacific, was kicked off seventy-nine years ago today. The American victory was called by historian John Keegan, “the most stunning and decisive blow in the history of naval warfare”. The Japanese lost four aircraft carriers. ‍
