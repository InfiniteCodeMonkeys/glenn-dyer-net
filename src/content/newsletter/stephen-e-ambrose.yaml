content: Stephen E. Ambrose, the prolific author of books that delved into the events and people involved in WWII, as well as biographies of Eisenhower and Nixon, died on this date in 2002. One work that brought Ambrose much acclaim was the book, Band of Brothers, which focused on the men of E Company, 506th Regiment of the 101st Airborne.
