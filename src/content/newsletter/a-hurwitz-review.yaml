content: "Amazon customer A. Hurwitz had some kind words for The Unquiet Genius, the third book in the Conor Thorn Series: “Glenn Dyer displays masterful writing that only serves to aid to the overall plot, and showcase the width of his talents. Dyer is an ace, accomplished at writing not only likable or detestable characters, but also including an intriguing plot and powerful syntax…Dyer is seemingly always plotting, setting everything up purposefully. He desires to usher in an improved era of writing, one where characters are developed to add to the overall effect of a novel. The Unquiet Genius accomplishes this, even going beyond the designated boundaries: a book for the ages.” It will be tough to live up to A. Hurwitz’s praise as far as Book #4 is concerned."
