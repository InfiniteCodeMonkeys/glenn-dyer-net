briefDescription: "Autumn 1942. Thorn investigates a vanishing Swedish cryptographer—and when his MI6 colleague disappears too, he uncovers a Nazi conspiracy that could doom the Allied war effort."
fullDescription: "Autumn 1942. OSS agent Conor Thorn investigates the disappearance of a Swedish cryptographer stationed in Britain. When his MI6 colleague also vanishes while pursuing the code-breaker to Stockholm, Thorn uncovers a Nazi conspiracy. Suspecting the cryptographer's wife and racing against time, Thorn must prevent classified intelligence from reaching enemy hands before it compromises Allied operations and costs lives."
interstitialQuote: Brilliantly researched thriller bringing WWII espionage to life with expectations exceeded.
genre: WWII Espionage Thriller
setting: "Britain & Stockholm, 1942"
