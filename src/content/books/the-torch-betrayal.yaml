title: The Torch Betrayal
number: 1
year: "2019"
coverImage: /the_torch_betrayal_2d.jpg
briefDescription: London, 1942. When Operation Torch invasion plans go missing, OSS agent Conor Thorn partners with MI6 agent Emily Bright to hunt the traitor before the Allies pay in blood.
fullDescription: "London, 1942. OSS agent Conor Thorn seeks redemption after a failed Tangier mission. When the plans for Operation Torch—the Allied invasion of North Africa—go missing, he partners with MI6 agent Emily Bright to find the traitor before it's too late. Their investigation uncovers Nazi sympathizers, Soviet double-agents, and Vatican clergy with hidden agendas. A high-stakes WWII thriller inspired by true events."
interstitialQuote: Atmospheric and tense, with plenty of treachery and a heavy dose of history.
genre: WWII Espionage Thriller
setting: "London & North Africa, 1942"
