briefDescription: "December 1942. Thorn hunts a brilliant nuclear physicist hiding in Italy—racing against the Nazis, Russian operatives, and a Vatican monsignor, all chasing the same dangerous secret."
fullDescription: December 1942. Elite OSS agent Conor Thorn pursues a brilliant nuclear physicist hiding in Italy whose knowledge could hand the Nazis an atomic advantage. Thorn reunites with his MI6 colleague to prevent the secret from reaching enemy hands while competing against Russian forces, a Vatican monsignor, and other rival parties. A rip-roaring, Nazi-punching World War II thriller about duty, sacrifice, and doing right regardless of cost.
interstitialQuote: Not to be missed, this one will blow you away!
genre: WWII Espionage Thriller
setting: "Italy & the Vatican, December 1942"
