title: Trust No One
number: 4
year: "2023"
coverImage: /trust_no_one_2d.jpg
briefDescription: "Algiers, Winter 1942. Dismissed from their agencies, Conor and Emily Thorn are pulled back in to help Eisenhower recover an archive that could tear the Allied alliance apart."
fullDescription: "Algiers, Winter 1942. Conor and Emily Thorn, recently dismissed from the OSS and MI6 respectively, are recruited to help General Eisenhower recover a rumored archive about an assassination plot threatening Allied unity. Operating in Nazi-occupied territory, they must navigate political intrigue and treachery while recovering from a brutal assault—and they can trust no one."
interstitialQuote: A propulsive, masterfully crafted WWII thriller.
genre: WWII Espionage Thriller
setting: "Algiers & North Africa, Winter 1942"
